<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Laundry Services</title>
		<link rel="stylesheet" href="styles.css" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<header class="site-header">
			<div class="container nav-bar">
				<div class="logo"><img src="images\laundry-logo.jpg" alt="Laundry Logo" class="logo-img"></div>
				<nav class="nav-links">
					<a href="#">Home</a>
					<a href="#">Services</a>
					<a href="#">About Us</a>
					<a href="#">Contact Us</a>
				</nav>
				<button class="pill-button" type="button">Username</button>
			</div>
		</header>

		<main class="hero">
			<div class="container hero-grid">
				<section class="hero-content">
					<h1>
						Revitalize Your<br />
						Clothes with Expert
						<span class="accent">Laundry Services!</span>
					</h1>
					<p>
						From premium dry cleaning to swift wash and fold, we
						deliver care and convenience. Schedule a pickup and
						rediscover the freshness of your clothes today!
					</p>
					<button class="cta" type="button">Book a service today!</button>
				</section>

				<section class="hero-media">
					<img
						src="images\laundry-img.png"
						alt="Laundry service illustration"
					/>
				</section>
			</div>
		</main>
	</body>
</html>
