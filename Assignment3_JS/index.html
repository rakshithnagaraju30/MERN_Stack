<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    
    <title>Responsive Design</title>
</head>
<body>

    <header id="greet">Hello!</header>
    <div class="container">
        <div class="box" id="red" onclick="red()" >Red</div>
        <div class="box" id="blue" onclick="blue()">Blue</div>
        <div class="box" id="green" onclick="green()">Green</div>
        <div class="box" id="yellow" onclick="yellow()">Yellow</div>
    </div>

    <div id="name-container">
        <input type="text" id="name" placeholder="Enter your name">
        <button type="button" onclick="greet()" id="greet-button" >Greet</button>
    </div>
    

    <script src="script.js"></script>
</body>
</html>
